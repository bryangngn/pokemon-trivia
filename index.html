<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokéTrivial</title>
    <style>
        :root {
            --primary: #3b4cca;
            --secondary: #ffde00;
            --correct: #2ecc71;
            --incorrect: #e74c3c;
            --bg: #f0f2f5;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        #game-container {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            padding: 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .cat-tag {
            align-self: center;
            background: #ef5350;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 0 4px 10px rgba(239, 83, 80, 0.3);
        }

        /* Contenedor de Imagen Inteligente */
        #image-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfdfd;
            border-radius: 18px;
            border: 1px dashed #eee;
            margin-top: 10px;
        }

        /* Clase para colapsar espacio si no hay imagen */
        .hidden { display: none !important; }

        .img-pokemon {
            max-width: 85%;
            height: auto;
            max-height: 220px; /* Tamaño optimizado para móvil */
            object-fit: contain;
            padding: 15px;
            transition: filter 0.4s ease;
        }

        h3 {
            margin: 10px 0;
            font-size: 1.25rem;
            color: var(--text);
            line-height: 1.3;
        }

        /* Grid de Respuestas */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            background-color: white;
            border: 2px solid #e0e0e0;
            color: var(--text);
            padding: 14px 10px;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 55px;
        }

        button:active { transform: scale(0.95); }

        /* Colores de Respuesta */
        button.correct { 
            background-color: var(--correct) !important; 
            border-color: var(--correct) !important; 
            color: white !important; 
        }
        button.incorrect { 
            background-color: var(--incorrect) !important; 
            border-color: var(--incorrect) !important; 
            color: white !important; 
        }
        button.disabled { pointer-events: none; opacity: 0.8; }

        #feedback-message {
            height: 28px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        #score-info {
            font-size: 0.8rem;
            color: #95a5a6;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        /* Ajustes para móviles muy estrechos */
        @media (max-width: 380px) {
            .options-grid { grid-template-columns: 1fr; }
            #game-container { padding: 18px; }
            h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="cat" class="cat-tag">CATEGORÍA</div>
    <div id="image-container" class="hidden"></div>
    <div id="question-text"><h3>Preparando Pokéball...</h3></div>
    <div class="options-grid" id="options"></div>
    <div id="feedback-message"></div>
    <div id="score-info">Puntuación: 0 | Pregunta: 0/1300</div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
