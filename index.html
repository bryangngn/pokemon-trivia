<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeTrivial</title>
    <style>
        :root {
            --primary: #3b4cca;
            --secondary: #ffde00;
            --correct: #2ecc71;
            --incorrect: #e74c3c;
            --bg: #f5f7fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }

        #game-container {
            background: white;
            width: 100%;
            max-width: 500px; /* Ancho ideal para lectura */
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Categoría */
        .cat-tag {
            align-self: center;
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Imagen Adaptable */
        #image-container {
            width: 100%;
            height: 250px; /* Altura fija para mantener consistencia */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            border-radius: 15px;
            overflow: hidden;
        }

        .img-pokemon {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        /* Pregunta */
        h3 {
            margin: 10px 0;
            font-size: 1.2rem;
            color: #333;
            line-height: 1.4;
        }

        /* Grid de Respuestas Adaptable */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columnas por defecto */
            gap: 12px;
        }

        button {
            background-color: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 8px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        button:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Estados de respuesta */
        button.correct { background-color: var(--correct) !important; border-color: var(--correct) !important; color: white !important; }
        button.incorrect { background-color: var(--incorrect) !important; border-color: var(--incorrect) !important; color: white !important; }
        button.disabled { pointer-events: none; opacity: 0.7; }

        /* Feedback y Marcador */
        #feedback-message { height: 24px; font-weight: bold; font-size: 1.1rem; }
        #score { font-size: 0.85rem; color: #777; border-top: 1px solid #eee; pt: 10px; }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 400px) {
            .options-grid {
                grid-template-columns: 1fr; /* 1 columna en pantallas muy pequeñas */
            }
            #image-container {
                height: 180px; /* Reducimos imagen en móviles pequeños */
            }
            h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="cat" class="cat-tag">CATEGORÍA</div>
    <div id="image-container">
        </div>
    <div id="question-text"><h3>Cargando aventura...</h3></div>
    <div class="options-grid" id="options"></div>
    <div id="feedback-message"></div>
    <div id="score">Puntuación: 0 | Pregunta: 0/1300</div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
