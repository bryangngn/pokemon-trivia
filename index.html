<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Trivial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header>
            <h1>Pokémon Trivia</h1>
            <div id="scoreboard">Puntos: <span id="puntos">0</span></div>

        <main id="game-card">

            <h2 id="enunciado">Cargando pregunta...</h2>

            <div id="opciones-container"></div>

            <div id="resultado-mensaje"></div>
        </main>
    </div>

    <script src="preguntas.js"></script>
    <script src="app.js"></script>
</body>
</html>
